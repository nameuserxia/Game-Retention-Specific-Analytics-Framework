    event_params: "event_params"

date_formats:
  event_time: "%Y-%m-%d %H:%M:%S"
  event_date: "%Y-%m-%d"
  reg_date: "%Y-%m-%d"

events:
  session_start: ["app_open"]
  level_start: ["level_start"]
  level_pass: ["level_complete"]
  level_fail: ["level_fail"]
  interstitial: []
  rewarded_video: []
  daily_task: []

churn_attribution:
  rules: []

markets:
  primary: "United States"
