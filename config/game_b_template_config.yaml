# Generic onboarding template.
# Copy this file and replace the right-hand side values with your own source columns.

game:
  name: "Your Game"
  version: "1.0"
  description: "Retention analysis configuration template"

analysis:
  reg_start: "2026-01-01"
  reg_end: "2026-01-31"
  retention_days: 1
  min_sample_size: 30

field_mapping:
  user_id: "user_id"
  event_time: "event_time"
  event_date: "event_date"
  reg_date: "reg_date"
  event_name: "event_name"
  country: "country"
  channel: "channel"
